<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
</head>
<body>

  <h2>Reset Password</h2>

  <input
    id="password"
    type="password"
    placeholder="New Password"
  >

  <button id="resetBtn">
    Reset Password
  </button>

  <p id="message"></p>

  <script>

    const token =
      new URLSearchParams(
        window.location.search
      )
      .get("token");

    document
      .getElementById("resetBtn")
      .addEventListener(
        "click",
        async () => {

          const password =
            document
              .getElementById("password")
              .value;

          const response =
            await fetch(
              "/api/auth/reset-password",
              {
                method: "POST",

                headers: {
                  "Content-Type":
                    "application/json"
                },

                body:
                  JSON.stringify({

                    token,

                    password

                  })

              }
            );

          const data =
            await response.json();

          document
            .getElementById("message")
            .innerText =
              data.message;

        }
      );

  </script>

</body>
</html>
