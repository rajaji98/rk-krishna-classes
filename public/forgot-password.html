<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
</head>
<body>

  <h2>Forgot Password</h2>

  <input
    id="email"
    type="email"
    placeholder="Enter your email"
  >

  <button id="sendBtn">
    Send Reset Link
  </button>

  <p id="message"></p>

  <script>

    document
      .getElementById("sendBtn")
      .addEventListener(
        "click",
        async () => {

          const email =
            document
              .getElementById("email")
              .value;

          const response =
            await fetch(
              "/api/auth/forgot-password",
              {
                method: "POST",

                headers: {
                  "Content-Type":
                    "application/json"
                },

                body:
                  JSON.stringify({
                    email
                  })
              }
            );

          const data =
            await response.json();

          document
            .getElementById("message")
            .innerText =
              data.message;

        }
      );

  </script>

</body>
</html>
